<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yashi's PhD Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:230px;min-width:230px;background:linear-gradient(180deg,#1e3a5f 0%,#1e2d4a 100%);display:flex;flex-direction:column;overflow-y:auto;transition:width .2s;}
#sidebar.collapsed{width:56px;min-width:56px;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{flex-shrink:0;background:white;border-bottom:1px solid #e2e8f0;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#content{flex:1;overflow-y:auto;padding:16px 20px 32px;}

/* Sidebar styles */
.sb-logo{padding:18px 16px 12px;color:white;}
.sb-logo .title{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;}
.sb-logo .sub{font-size:11px;opacity:.5;margin-top:2px;white-space:nowrap;overflow:hidden;}
.sb-section{padding:6px 10px 2px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;overflow:hidden;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;color:rgba(255,255,255,0.65);border-radius:8px;margin:1px 6px;transition:all .15s;white-space:nowrap;overflow:hidden;}
.sb-item:hover{background:rgba(255,255,255,0.08);color:white;}
.sb-item.active{background:rgba(99,102,241,0.35);color:white;}
.sb-item .icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.sb-item .label{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;}
.sb-divider{height:1px;background:rgba(255,255,255,0.08);margin:6px 14px;}
.sb-toggle{margin:auto 8px 12px;padding:8px;background:rgba(255,255,255,0.07);border:none;border-radius:8px;color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.sb-toggle:hover{background:rgba(255,255,255,0.12);color:white;}
#sidebar.collapsed .sb-logo .title,
#sidebar.collapsed .sb-logo .sub,
#sidebar.collapsed .sb-section,
#sidebar.collapsed .sb-item .label,
#sidebar.collapsed .sb-divider{display:none;}
#sidebar.collapsed .sb-item{justify-content:center;padding:9px;}

/* Cards */
.card{background:white;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:12px;}

/* Rich Text Editor */
.rte-wrap{border:1px solid #e2e8f0;border-radius:9px;overflow:hidden;}
.rte-bar{display:flex;flex-wrap:wrap;gap:2px;padding:5px 7px;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.rte-bar button{background:none;border:none;border-radius:5px;padding:4px 6px;cursor:pointer;font-size:12px;color:#475569;line-height:1;font-family:inherit;}
.rte-bar button:hover{background:#e2e8f0;}
.rte-bar .sep{width:1px;background:#e2e8f0;margin:2px 3px;align-self:stretch;}
.rte-body{min-height:120px;padding:10px 12px;outline:none;font-size:14px;line-height:1.75;background:white;overflow-x:hidden;overflow-y:auto;word-break:break-word;}
.rte-body:focus{outline:none;}
.rte-body ul{padding-left:20px;}.rte-body ol{padding-left:20px;}
.rte-body .cl-item{display:flex;align-items:flex-start;gap:6px;margin:3px 0;padding:1px 0;}
.rte-body .cl-item input[type=checkbox]{width:16px;height:16px;margin-top:3px;flex-shrink:0;cursor:pointer;accent-color:#6366f1;}
.rte-body .cl-item span.cl-text{flex:1;outline:none;min-width:20px;}
.rte-body .cl-item.done span.cl-text{text-decoration:line-through;color:#94a3b8;}
.rte-body .cl-item .cl-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0;margin-top:2px;}
.rte-body .cl-item .cl-del:hover{color:#ef4444;}
.rte-body:empty:before{content:attr(data-ph);color:#94a3b8;pointer-events:none;display:block;}

/* Misc */
.btn{border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-weight:600;font-size:13px;color:white;}
.inp{display:block;width:100%;padding:8px 11px;border-radius:8px;border:1px solid #e2e8f0;font-size:14px;margin-bottom:10px;outline:none;}
.lbl{display:block;margin-bottom:4px;font-weight:600;font-size:12px;color:#64748b;}
.tag{border-radius:5px;padding:2px 9px;font-size:11px;font-weight:700;display:inline-block;color:white;}
.pill{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:3px 9px;font-size:11px;color:#475569;}

@media(max-width:600px){#sidebar{width:52px;min-width:52px;}#sidebar .sb-logo .title,#sidebar .sb-logo .sub,#sidebar .sb-section,#sidebar .sb-item .label,#sidebar .sb-divider{display:none;}#sidebar .sb-item{justify-content:center;padding:9px;}#content{padding:12px 12px 28px;}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const fmt=d=>d.toISOString().split("T")[0];
const parse=s=>new Date(s+"T12:00:00");
const addDays=(s,n)=>{const d=parse(s);d.setDate(d.getDate()+n);return fmt(d);};
const diff=(a,b)=>Math.round((parse(b)-parse(a))/86400000);
const today=()=>fmt(new Date());
const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

// Protocols
const getCellMedia=d=>({0:"Ri + E8",1:"E8",2:"E8F",3:"E8F"}[d]??null);
const getNormalTask=d=>{const m={"-3":"Seeding","-2":"E8F","-1":"E8F","0":"CHIR","1":"-I","2":"IWP4","4":"-I"};if(m[d]!==undefined)return m[d];if(d>=6&&d<=21&&(d-6)%2===0)return"+C (media change)";return null;};
const getVascTask=d=>{const m={"-3":"Seeding","-2":"E8F","-1":"E8F","0":"CHIR","1":"-I + BWP4 + FGF2","2":"IWP4 + BWP4 + FGF2","4":"-I + BWP4 + FGF2","5":"FGF2 + VEGF + +C"};if(m[d]!==undefined)return m[d];if(d>=7&&d<=21&&(d-7)%2===0)return"+C + FGF2 + VEGF + A8301 + SB431542";return null;};

const TASK_TYPES=[{id:"coding",label:"💻 Coding",color:"#6366f1"},{id:"ta",label:"📚 TA Work",color:"#f59e0b"},{id:"course",label:"🎓 Course",color:"#10b981"},{id:"meeting",label:"👥 Meeting",color:"#3b82f6"},{id:"other",label:"📌 Other",color:"#8b5cf6"}];
const EVENT_CATS=[{id:"conference",label:"🏛 Conference",color:"#6366f1"},{id:"poster",label:"🖼 Poster",color:"#f59e0b"},{id:"paper",label:"📄 Paper",color:"#10b981"},{id:"admin",label:"📋 Admin",color:"#3b82f6"},{id:"other",label:"📌 Other",color:"#8b5cf6"}];
const HIGHLIGHTS=["#fef08a","#bbf7d0","#bfdbfe","#fecaca","#e9d5ff","#fed7aa"];

// ── Rich Text Editor ─────────────────────────────────────────────────
function RTE({value,onChange,placeholder,minH=120}){
  const ref=useRef(null);
  const skip=useRef(false);

  const fire=useCallback(()=>{skip.current=true;onChange(ref.current.innerHTML);},[onChange]);

  // Attach checkbox + delete listeners to all cl-items
  const bind=useCallback(()=>{
    if(!ref.current)return;
    ref.current.querySelectorAll(".cl-item").forEach(item=>{
      const cb=item.querySelector("input[type=checkbox]");
      const del=item.querySelector(".cl-del");
      if(cb&&!cb._b){cb._b=true;cb.addEventListener("change",()=>{item.classList.toggle("done",cb.checked);fire();});}
      if(del&&!del._b){del._b=true;del.addEventListener("mousedown",e=>{e.preventDefault();item.remove();fire();});}
    });
  },[fire]);

  useEffect(()=>{
    if(ref.current&&!skip.current){ref.current.innerHTML=value||"";bind();}
    skip.current=false;
  },[value]);

  const exec=(cmd,val=null)=>{document.execCommand(cmd,false,val);ref.current?.focus();};

  // Find ancestor cl-item of current selection
  const getClItem=()=>{
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return null;
    let node=sel.getRangeAt(0).startContainer;
    while(node&&node!==ref.current){if(node.classList?.contains("cl-item"))return node;node=node.parentElement;}
    return null;
  };

  const focusSpan=(item,atEnd=true)=>{
    const sp=item?.querySelector(".cl-text");
    if(!sp)return;
    sp.focus();
    const r=document.createRange(),s=window.getSelection();
    r.selectNodeContents(sp);
    r.collapse(!atEnd);
    s.removeAllRanges();s.addRange(r);
  };

  const makeClItem=()=>{
    const item=document.createElement("div");item.className="cl-item";
    const cb=document.createElement("input");cb.type="checkbox";
    cb.addEventListener("change",()=>{item.classList.toggle("done",cb.checked);fire();});
    const span=document.createElement("span");span.className="cl-text";span.contentEditable="true";span.innerHTML="<br>";
    const del=document.createElement("button");del.className="cl-del";del.innerHTML="✕";del.title="Delete row";
    del.addEventListener("mousedown",e=>{e.preventDefault();item.remove();fire();});
    item.appendChild(cb);item.appendChild(span);item.appendChild(del);
    return item;
  };

  const addChecklist=()=>{
    const item=makeClItem();
    const cur=getClItem();
    if(cur)cur.after(item);
    else{
      // insert at cursor position
      const sel=window.getSelection();
      if(sel&&sel.rangeCount){const r=sel.getRangeAt(0);r.collapse(false);r.insertNode(item);r.setStartAfter(item);sel.removeAllRanges();sel.addRange(r);}
      else ref.current.appendChild(item);
    }
    focusSpan(item);
    fire();
  };

  const handleKeyDown=e=>{
    const item=getClItem();
    if(!item)return;
    const span=item.querySelector(".cl-text");
    const isEmpty=!span||span.innerText.replace(/\u00a0/g,"").trim()==="";

    if(e.key==="Backspace"&&isEmpty){
      e.preventDefault();
      const prev=item.previousElementSibling;
      item.remove();
      // move cursor to end of previous element
      if(prev){const r=document.createRange(),s=window.getSelection();r.selectNodeContents(prev);r.collapse(false);s.removeAllRanges();s.addRange(r);}
      fire();return;
    }
    if(e.key==="Enter"){
      e.preventDefault();
      const next=makeClItem();
      item.after(next);
      focusSpan(next);
      fire();return;
    }
  };

  const handleInput=()=>{bind();fire();};

  const T=({cmd,val,title,ch})=><button title={title} onMouseDown={e=>{e.preventDefault();exec(cmd,val);}}>{ch}</button>;
  return(
    <div className="rte-wrap">
      <div className="rte-bar">
        <T cmd="bold"          title="Bold"          ch={<b>B</b>}/>
        <T cmd="italic"        title="Italic"        ch={<i>I</i>}/>
        <T cmd="underline"     title="Underline"     ch={<u>U</u>}/>
        <T cmd="strikeThrough" title="Strikethrough" ch={<s>S</s>}/>
        <T cmd="superscript"   title="Superscript"   ch="x²"/>
        <T cmd="subscript"     title="Subscript"     ch="x₂"/>
        <div className="sep"/>
        {HIGHLIGHTS.map(c=><button key={c} title="Highlight" onMouseDown={e=>{e.preventDefault();exec("hiliteColor",c);}} style={{background:c,border:"1px solid #e2e8f0",borderRadius:4,width:17,height:17,padding:0,cursor:"pointer"}}/>)}
        <div className="sep"/>
        <T cmd="insertUnorderedList" title="Bullet list"   ch="• —"/>
        <T cmd="insertOrderedList"   title="Numbered list" ch="1.—"/>
        <button title="Checklist" onMouseDown={e=>{e.preventDefault();addChecklist();}}>☑</button>
        <div className="sep"/>
        <T cmd="justifyLeft"   title="Left"   ch="⫷"/>
        <T cmd="justifyCenter" title="Center" ch="≡"/>
        <T cmd="justifyRight"  title="Right"  ch="⫸"/>
        <T cmd="indent"        title="Indent" ch="→"/>
        <T cmd="outdent"       title="Outdent"ch="←"/>
        <div className="sep"/>
        <button title="Link" onMouseDown={e=>{e.preventDefault();const u=prompt("URL:","https://");if(u)exec("createLink",u);}}>🔗</button>
        <T cmd="removeFormat"  title="Clear formatting" ch="✕"/>
      </div>
      <div ref={ref} className="rte-body" contentEditable suppressContentEditableWarning
        onInput={handleInput} onKeyDown={handleKeyDown}
        style={{minHeight:minH}} data-ph={placeholder}/>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{background:"white",borderRadius:16,padding:24,width:"min(460px,94vw)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <strong style={{fontSize:16}}>{title}</strong>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────
const NAV=[
  {id:"planner", icon:"📋", label:"Daily Plan",  section:"MAIN"},
  {id:"meetings",icon:"🧪", label:"Meetings"},
  {id:"events",  icon:"🎯", label:"Deadlines"},
  {id:"cells",   icon:"🧫", label:"Cell Culture"},
  {id:"orgs",    icon:"🫀", label:"Organoids"},
  {id:"notes",   icon:"📝", label:"Daily Notes", section:"NOTES"},
  {id:"protocols",icon:"📂",label:"Protocols",   section:"LIBRARY"},
  {id:"library", icon:"📚", label:"Notes Library"},
];

function Sidebar({tab,setTab,collapsed,setCollapsed,protCount,libCount}){
  let lastSection="";
  return(
    <div id="sidebar" className={collapsed?"collapsed":""}>
      <div className="sb-logo">
        <div className="title">🎓 Yashi's PhD</div>
        <div className="sub">Lab · Life · Research</div>
      </div>
      {NAV.map(n=>{
        const showSec=n.section&&n.section!==lastSection;
        if(n.section)lastSection=n.section;
        const badge=n.id==="protocols"?protCount:n.id==="library"?libCount:0;
        return(
          <React.Fragment key={n.id}>
            {showSec&&<div className="sb-section">{n.section}</div>}
            <div className={`sb-item${tab===n.id?" active":""}`} onClick={()=>setTab(n.id)}>
              <span className="icon">{n.icon}</span>
              <span className="label">{n.label}{badge>0?<span style={{marginLeft:6,background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"1px 6px",fontSize:10}}>{badge}</span>:null}</span>
            </div>
          </React.Fragment>
        );
      })}
      <div style={{flex:1}}/>
      <div className="sb-divider"/>
      <button className="sb-toggle" onClick={()=>setCollapsed(!collapsed)} title={collapsed?"Expand":"Collapse"}>
        {collapsed?"▶":"◀"}
      </button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("planner");
  const [collapsed,setCollapsed]=useState(false);
  const [date,setDate]=useState(today());
  const [cells,setCells]=useState(()=>LS.get("phd_cells",[]));
  const [orgs,setOrgs]=useState(()=>LS.get("phd_orgs",[]));
  const [ptasks,setPtasks]=useState(()=>LS.get("phd_ptasks",{}));
  const [notes,setNotes]=useState(()=>LS.get("phd_notes",{}));
  const [events,setEvents]=useState(()=>LS.get("phd_events",[]));
  const [meeting,setMeeting]=useState(()=>LS.get("phd_meeting",{myTurnFriday:false}));
  const [protocols,setProtocols]=useState(()=>LS.get("phd_protocols",[]));
  const [libNotes,setLibNotes]=useState(()=>LS.get("phd_lib",[]));
  const [modal,setModal]=useState(null);
  const [nc,setNc]=useState({name:"",passage:0,passageDate:""});
  const [no,setNo]=useState({name:"",type:"normal",format:"gel",seedDate:""});
  const [nt,setNt]=useState({type:"coding",title:"",time:"09:00",duration:60,detail:""});
  const [ne,setNe]=useState({cat:"poster",title:"",deadline:"",reminderDays:7,detail:""});
  const [np,setNp]=useState({title:"",category:"",content:""});
  const [nl,setNl]=useState({title:"",tag:"",content:""});
  const [expandProt,setExpandProt]=useState(null);
  const [expandLib,setExpandLib]=useState(null);

  useEffect(()=>LS.set("phd_cells",cells),[cells]);
  useEffect(()=>LS.set("phd_orgs",orgs),[orgs]);
  useEffect(()=>LS.set("phd_ptasks",ptasks),[ptasks]);
  useEffect(()=>LS.set("phd_notes",notes),[notes]);
  useEffect(()=>LS.set("phd_events",events),[events]);
  useEffect(()=>LS.set("phd_meeting",meeting),[meeting]);
  useEffect(()=>LS.set("phd_protocols",protocols),[protocols]);
  useEffect(()=>LS.set("phd_lib",libNotes),[libNotes]);

  const navDay=n=>setDate(addDays(date,n));
  const dow=parse(date).getDay();
  const setNote=(k,v)=>setNotes(n=>({...n,[k]:v}));

  const getLabTasks=d=>{
    const out=[];
    cells.forEach(c=>{const day=diff(c.passageDate,d),media=getCellMedia(day);if(day>=4)out.push({cat:"cell",name:c.name,day,label:`Passage required! P${c.passage} D${day}`,detail:`${c.name} needs passaging (D${day})`,urgent:true});else if(media)out.push({cat:"cell",name:c.name,day,label:`Media: ${media}`,detail:`${c.name} P${c.passage} D${day} → ${media}`,urgent:false});});
    orgs.forEach(o=>{const day=diff(o.seedDate,d)-3,task=(o.type==="normal"?getNormalTask:getVascTask)(day);if(task)out.push({cat:"org",name:o.name,day,label:task,detail:`${o.name} D${day} → ${task}`,urgent:false});});
    return out;
  };

  const labToday=getLabTasks(date),labTomorrow=getLabTasks(addDays(date,1));
  const personal=[...(ptasks[date]||[])].sort((a,b)=>a.time.localeCompare(b.time));
  const activeEvents=events.filter(e=>!e.archived).map(e=>({...e,daysLeft:diff(today(),e.deadline)})).sort((a,b)=>a.daysLeft-b.daysLeft);
  const archivedEvents=events.filter(e=>e.archived);
  const eventReminders=activeEvents.filter(e=>e.daysLeft>=0&&e.daysLeft<=e.reminderDays);

  const exportICS=()=>{
    const evts=[];
    labToday.forEach((t,i)=>{const hr=String(9+i).padStart(2,"0"),ds=date.replace(/-/g,"");evts.push(`BEGIN:VEVENT\nSUMMARY:[Lab] ${t.name} – ${t.label}\nDTSTART:${ds}T${hr}0000\nDTEND:${ds}T${hr}3000\nEND:VEVENT`);});
    personal.forEach(t=>{const[hh,mm]=t.time.split(":"),sm=parseInt(hh)*60+parseInt(mm),em=sm+(t.duration||60),ds=date.replace(/-/g,""),eH=String(Math.floor(em/60)).padStart(2,"0"),eM=String(em%60).padStart(2,"0"),tp=TASK_TYPES.find(x=>x.id===t.type);evts.push(`BEGIN:VEVENT\nSUMMARY:${tp?.label||""} ${t.title}\nDTSTART:${ds}T${hh}${mm}00\nDTEND:${ds}T${eH}${eM}00\nEND:VEVENT`);});
    if(!evts.length)return alert("No tasks to export.");
    const a=document.createElement("a");a.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(`BEGIN:VCALENDAR\nVERSION:2.0\n${evts.join("\n")}\nEND:VCALENDAR`);a.download=`phd-${date}.ics`;a.click();
  };

  const tabLabel=NAV.find(n=>n.id===tab);

  return(
    <div id="app">
      <Sidebar tab={tab} setTab={setTab} collapsed={collapsed} setCollapsed={setCollapsed} protCount={protocols.length} libCount={libNotes.length}/>

      <div id="main">
        {/* Topbar */}
        <div id="topbar">
          <span style={{fontWeight:700,fontSize:16,color:"#1e3a5f"}}>{tabLabel?.icon} {tabLabel?.label}</span>
          {(tab==="planner"||tab==="notes")&&<>
            <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:8}}>
              <button onClick={()=>navDay(-1)} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontWeight:700}}>◀</button>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"4px 10px",fontSize:14,outline:"none"}}/>
              <button onClick={()=>navDay(1)} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontWeight:700}}>▶</button>
              <button onClick={()=>setDate(today())} style={{background:"#6366f1",color:"white",border:"none",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>Today</button>
            </div>
            <button onClick={exportICS} style={{marginLeft:"auto",background:"#1e3a5f",color:"white",border:"none",borderRadius:7,padding:"5px 13px",cursor:"pointer",fontWeight:700,fontSize:12}}>📅 Export .ics</button>
          </>}
          {/* Deadline banner */}
          {eventReminders.length>0&&<div style={{width:"100%",marginTop:6,background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:8,padding:"6px 10px"}}>
            {eventReminders.map(e=><span key={e.id} style={{fontSize:12,color:"#92400e",marginRight:12}}>⚠️ <strong>{e.title}</strong> — {e.daysLeft===0?"DUE TODAY!":`${e.daysLeft}d left`}</span>)}
          </div>}
        </div>

        {/* Content */}
        <div id="content">

          {/* ══ DAILY ══ */}
          {tab==="planner"&&(<>

                    <span style={{color:"#94a3b8",fontSize:18}}>{expandLib===n.id?"▲":"▼"}</span>
                  </div>
                </div>
                {expandLib===n.id&&<div style={{marginTop:12}}>
                  <RTE value={n.content||""} onChange={v=>setLibNotes(libNotes.map((x,j)=>j===i?{...x,content:v}:x))} placeholder="Notes, summaries, references..." minH={200}/>
                </div>}
              </div>
            ))}
          </>)}

        </div>{/* end content */}
      </div>{/* end main */}

      {/* ══ MODALS ══ */}
      {modal==="cell"&&<Modal title="➕ Add Cell Line" onClose={()=>setModal(null)}>
        <label className="lbl">Name</label><input className="inp" value={nc.name} onChange={e=>setNc({...nc,name:e.target.value})} placeholder="e.g. iPSC-Line1"/>
        <label className="lbl">Passage (P)</label><input className="inp" type="number" value={nc.passage} onChange={e=>setNc({...nc,passage:parseInt(e.target.value)||0})}/>
        <label className="lbl">Last passage date (D0)</label><input className="inp" type="date" value={nc.passageDate} onChange={e=>setNc({...nc,passageDate:e.target.value})}/>
        <button className="btn" style={{background:"#8b5cf6",width:"100%",padding:10}} onClick={()=>{if(!nc.name||!nc.passageDate)return;setCells([...cells,{...nc,id:Date.now()}]);setModal(null);}}>Add</button>
      </Modal>}

      {modal==="org"&&<Modal title="➕ Add Organoid Batch" onClose={()=>setModal(null)}>
        <label className="lbl">Batch name</label><input className="inp" value={no.name} onChange={e=>setNo({...no,name:e.target.value})} placeholder="e.g. Batch-A"/>
        <label className="lbl">Protocol</label><select className="inp" value={no.type} onChange={e=>setNo({...no,type:e.target.value})}><option value="normal">Normal</option><option value="vasc">Vascularized</option></select>
        <label className="lbl">Format</label><select className="inp" value={no.format} onChange={e=>setNo({...no,format:e.target.value})}><option value="gel">Gel</option><option value="normal">Normal</option><option value="chip">Chip</option></select>
        <label className="lbl">Seeding date (D-3)</label><input className="inp" type="date" value={no.seedDate} onChange={e=>setNo({...no,seedDate:e.target.value})}/>
        {no.seedDate&&<div style={{background:"#eff6ff",borderRadius:8,padding:"7px 11px",fontSize:12,color:"#1d4ed8",marginBottom:10}}>D0 (CHIR): {addDays(no.seedDate,3)}</div>}
        <button className="btn" style={{background:"#0891b2",width:"100%",padding:10}} onClick={()=>{if(!no.name||!no.seedDate)return;setOrgs([...orgs,{...no,id:Date.now()}]);setModal(null);}}>Add</button>
      </Modal>}

      {modal==="task"&&<Modal title="➕ Add Schedule Item" onClose={()=>setModal(null)}>
        <label className="lbl">Type</label><select className="inp" value={nt.type} onChange={e=>setNt({...nt,type:e.target.value})}>{TASK_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select>
        <label className="lbl">Title</label><input className="inp" value={nt.title} onChange={e=>setNt({...nt,title:e.target.value})} placeholder="e.g. CS101 Lecture"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label className="lbl">Start time</label><input className="inp" type="time" value={nt.time} onChange={e=>setNt({...nt,time:e.target.value})}/></div>
          <div><label className="lbl">Duration (min)</label><input className="inp" type="number" value={nt.duration} onChange={e=>setNt({...nt,duration:parseInt(e.target.value)||60})}/></div>
        </div>
        <label className="lbl">Notes</label><input className="inp" value={nt.detail} onChange={e=>setNt({...nt,detail:e.target.value})} placeholder="Location, link..."/>
        <button className="btn" style={{background:"#6366f1",width:"100%",padding:10}} onClick={()=>{if(!nt.title)return;setPtasks({...ptasks,[date]:[...(ptasks[date]||[]),{...nt,id:Date.now()}]});setModal(null);}}>Add</button>
      </Modal>}

      {modal==="event"&&<Modal title="➕ Add Deadline / Event" onClose={()=>setModal(null)}>
        <label className="lbl">Category</label><select className="inp" value={ne.cat} onChange={e=>setNe({...ne,cat:e.target.value})}>{EVENT_CATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select>
        <label className="lbl">Title</label><input className="inp" value={ne.title} onChange={e=>setNe({...ne,title:e.target.value})} placeholder="e.g. Submit AHA Poster Abstract"/>
        <label className="lbl">Deadline</label><input className="inp" type="date" value={ne.deadline} onChange={e=>setNe({...ne,deadline:e.target.value})}/>
        <label className="lbl">Remind me _ days before</label><input className="inp" type="number" value={ne.reminderDays} onChange={e=>setNe({...ne,reminderDays:parseInt(e.target.value)||7})}/>
        <label className="lbl">Notes</label><input className="inp" value={ne.detail} onChange={e=>setNe({...ne,detail:e.target.value})} placeholder="Conference name, link..."/>
        <button className="btn" style={{background:"#1e3a5f",width:"100%",padding:10}} onClick={()=>{if(!ne.title||!ne.deadline)return;setEvents([...events,{...ne,id:Date.now(),archived:false}]);setModal(null);}}>Add</button>
      </Modal>}

      {modal==="prot"&&<Modal title="➕ Add Protocol" onClose={()=>setModal(null)}>
        <label className="lbl">Protocol name</label><input className="inp" value={np.title} onChange={e=>setNp({...np,title:e.target.value})} placeholder="e.g. iPSC Cardioid Differentiation"/>
        <label className="lbl">Category (optional)</label><input className="inp" value={np.category} onChange={e=>setNp({...np,category:e.target.value})} placeholder="e.g. Wet Lab / Imaging / Staining"/>
        <button className="btn" style={{background:"#1e3a5f",width:"100%",padding:10}} onClick={()=>{if(!np.title)return;setProtocols([...protocols,{...np,id:Date.now(),content:""}]);setModal(null);}}>Add Protocol</button>
      </Modal>}

      {modal==="lib"&&<Modal title="➕ Add Library Note" onClose={()=>setModal(null)}>
        <label className="lbl">Title</label><input className="inp" value={nl.title} onChange={e=>setNl({...nl,title:e.target.value})} placeholder="e.g. Paper summary: Nature 2024"/>
        <label className="lbl">Tag (optional)</label><input className="inp" value={nl.tag} onChange={e=>setNl({...nl,tag:e.target.value})} placeholder="e.g. Paper / Lecture / Idea"/>
        <button className="btn" style={{background:"#8b5cf6",width:"100%",padding:10}} onClick={()=>{if(!nl.title)return;setLibNotes([...libNotes,{...nl,id:Date.now(),date:today(),content:""}]);setModal(null);}}>Add Note</button>
      </Modal>}

    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
